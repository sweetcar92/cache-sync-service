name: Keepalive Service

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Touch Keepalive File
        run: |
          date -u > .github/keepalive
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/keepalive
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated monthly keepalive ping" && git push)
